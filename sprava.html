<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administrace | Syrovátkovi Statek</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    const config = {
      backend: {
        name: "git-gateway",
        branch: "main",
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "content",
          label: "Obsah webu",
          delete: false,
          editor: { preview: false },
          files: [
            {
              label: "Hlavní obsah a Produkty",
              name: "data",
              file: "data/content.json",
              fields: [
                {
                  label: "Sekce O nás",
                  name: "about",
                  widget: "object",
                  fields: [
                    { label: "Levý sloupec", name: "textLeft", widget: "list", field: { label: "Odstavec", name: "p", widget: "string" } },
                    { label: "Pravý sloupec", name: "textRight", widget: "list", field: { label: "Odstavec", name: "p", widget: "string" } },
                    { label: "Carousel", name: "carouselImages", widget: "list", min: 4, max: 4, field: { label: "Obrázek", name: "img", widget: "image" } }
                  ]
                },
                {
                  label: "Produkty",
                  name: "products",
                  widget: "list",
                  summary: "{{name}}",
                  fields: [
                    { label: "Název", name: "name", widget: "string" },
                    { label: "Poznámka", name: "note", widget: "string", required: false },
                    { label: "Jednotka", name: "unit", widget: "string" },
                    { label: "Cena", name: "price", widget: "string" },
                    { label: "VYPRODÁNO", name: "soldOut", widget: "boolean", default: false },
                    { label: "Linka", name: "hasBottomBorder", widget: "boolean", default: false }
                  ]
                },
                {
                  label: "Kontakt",
                  name: "contact",
                  widget: "object",
                  fields: [
                    { label: "Email", name: "email", widget: "string" },
                    { label: "Telefon", name: "phone", widget: "string" },
                    { label: "Adresa 1", name: "addressLine1", widget: "string" },
                    { label: "Adresa 2", name: "addressLine2", widget: "string" },
                    { label: "Subjekt", name: "legalName", widget: "string" },
                    { label: "IČ", name: "ic", widget: "string" }
                  ]
                }
              ]
            }
          ]
        }
      ]
    };
    CMS.init({ config });
  </script>
</body>
</html>
