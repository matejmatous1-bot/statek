<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Správa nabídky | Statek Syrovátkovi</title>
  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  
  <style>
    /* CUSTOM STYLING PRO ADMIN ROZHRANÍ */
    /* Tento blok přebarvuje standardní Decap CMS do barev statku */
    
    /* Skrytí zbytečných prvků pro čistší UX */
    .nc-app-config-header { display: none !important; }

    /* Hlavní kontejner */
    #nc-root #nc-app-container {
      background-color: #f8fafc;
    }

    /* Úprava horní lišty */
    header {
      background-color: #00527d !important;
      color: white !important;
    }

    /* Úprava seznamu položek - Dashboard efekt */
    .nc-collectionPage-sidebar {
      background-color: white !important;
      border-right: 1px solid #e2e8f0 !important;
    }

    /* Styl pro řádky v seznamu */
    .nc-list-item-summary {
      display: flex !important;
      align-items: center !important;
      padding: 12px !important;
      font-family: sans-serif !important;
      font-size: 15px !important;
    }

    /* Úprava editačního okna */
    .nc-controlPane-control {
      margin-bottom: 20px !important;
      border-radius: 8px !important;
      border: 1px solid #e2e8f0 !important;
      padding: 15px !important;
      background: white !important;
    }

    /* Vylepšení tlačítek */
    .nc-app-header-button {
      background-color: #fbd4dc !important;
      color: #00527d !important;
      font-weight: bold !important;
      border-radius: 99px !important;
      text-transform: uppercase !important;
      padding: 8px 20px !important;
    }
  </style>
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <!-- Načtení Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    const config = {
      backend: {
        name: "git-gateway",
        branch: "main",
      },
      locale: 'cs',
      display_url: window.location.origin,
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "meat_offer",
          label: "🥩 NABÍDKA MASA",
          delete: true,
          editor: { preview: false },
          files: [
            {
              label: "Aktuální ceník produktů",
              name: "products_data",
              file: "data/content.json",
              fields: [
                {
                  label: "Položky v ceníku",
                  name: "products",
                  widget: "list",
                  // UX Dashboard v seznamu:
                  summary: "{{#if soldOut}}🔴 [VYPRODÁNO] {{else}}🟢 [SKLADEM] {{/if}} | {{name}} | {{price}} Kč",
                  add_to_top: true,
                  fields: [
                    { 
                      label: "AKTIVNÍ STAV", 
                      name: "soldOut", 
                      widget: "boolean", 
                      default: false,
                      hint: "Zapnutím (modrá) označíte maso jako VYPRODANÉ."
                    },
                    { label: "Název masa", name: "name", widget: "string" },
                    { label: "Gramáž / Balení", name: "unit", widget: "string", default: "1 kg" },
                    { label: "Cena (Kč)", name: "price", widget: "string" },
                    
                    { 
                      label: "📐 Vzhled řádku (Pokročilé)", 
                      name: "format", 
                      widget: "object",
                      collapsed: true,
                      fields: [
                        { label: "Poznámka v závorce", name: "note", widget: "string", required: false },
                        { label: "Růžová linka pod", name: "hasBottomBorder", widget: "boolean", default: false },
                        { label: "Těsné řádkování", name: "tightSpacing", widget: "boolean", default: false },
                        { label: "Větší mezera nad (kategorie)", name: "isCategoryHeader", widget: "boolean", default: false }
                      ]
                    }
                  ]
                }
              ]
            }
          ]
        }
      ]
    };

    CMS.init({ config });
  </script>
</body>
</html>
