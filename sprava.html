<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Správa nabídky | Statek Syrovátkovi</title>
  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    const config = {
      backend: {
        name: "git-gateway",
        branch: "main",
      },
      display_url: window.location.origin,
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "meat_offer",
          label: "🥩 NABÍDKA MASA",
          delete: false,
          editor: { preview: false },
          files: [
            {
              label: "Aktuální ceník",
              name: "products_data",
              file: "data/content.json",
              fields: [
                {
                  label: "Seznam položek v nabídce",
                  name: "products",
                  widget: "list",
                  // Toto vytvoří přehledný řádek v seznamu pro skvělé UX
                  summary: "{{#if soldOut}}🔴 VYPRODÁNO{{else}}🟢 SKLADEM{{/if}} | {{name}} | {{price}} Kč",
                  add_to_top: true,
                  fields: [
                    { 
                      label: "STAV (Zapnuto = Vyprodáno / Vypnuto = Skladem)", 
                      name: "soldOut", 
                      widget: "boolean", 
                      default: false,
                      hint: "Když zapnete, položka se na webu přeškrtne."
                    },
                    { label: "Název masa / produktu", name: "name", widget: "string" },
                    { label: "Váha / Jednotka (např. 1 kg nebo 10 kg balík)", name: "unit", widget: "string", default: "1 kg" },
                    { label: "Cena (Kč)", name: "price", widget: "string" },
                    
                    // Pokročilé formátování - schované v sbalené sekci
                    { 
                      label: "⚙️ Pokročilé nastavení (mezery, linky)", 
                      name: "format", 
                      widget: "object",
                      collapsed: true,
                      fields: [
                        { label: "Poznámka v závorce (např. mix masa)", name: "note", widget: "string", required: false },
                        { label: "Růžová linka pod řádkem", name: "hasBottomBorder", widget: "boolean", default: false },
                        { label: "Těsné řádkování (kategorie)", name: "tightSpacing", widget: "boolean", default: false },
                        { label: "Větší mezera nad řádkem (začátek sekce)", name: "isCategoryHeader", widget: "boolean", default: false }
                      ]
                    }
                  ]
                }
              ]
            }
          ]
        }
      ]
    };

    CMS.init({ config });
  </script>
</body>
</html>
