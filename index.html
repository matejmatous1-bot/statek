        }

            content: '';
            position: absolute;
            left: 0;
            top: 40%; 
            width: 100%;
            height: 1px; 
            background-color: white;
            z-index: 10;
            pointer-events: none;
            transform: translateY(-50%);

    <!-- SKRIPTY PRO NAČÍTÁNÍ DAT A FUNKCIONALITU -->
    <script>
        // Náhradní data pro případ, že fetch selže (např. při lokálním otevírání index.html)
        const mockData = {
          "about": {
            "textLeft": ["Jsme rodinný statek na Praze-západ, konkrétně v obci Dolní Břežany – Lhota.", "Chovu hovězího dobytka se věnujeme od r. 2010 a současně k tomu obhospodařujeme 130 ha zemědělské půdy k rostlinné výrobě a jako krmivo pro náš skot."],
            "textRight": ["Zaměřujeme se na chov masného plemene Blonde d'Aquitaine ve volném ustájení s výběhy.", "Maso je k odběru přímo na statku v obchůdku. Maso je vakuově zabalené, označené a popsané, o jaký druh masa se jedná."],
            "carouselImages": ["images/cow1.jpg", "images/cow2.jpg", "images/cow3.jpg", "images/cow4.jpg"]
          },
          "products": [
            {"name": "Balík masa", "note": "přední, zadní + kus hrudí, žebro", "unit": "10 kg", "price": "2 600", "soldOut": false, "hasBottomBorder": true},
            {"name": "Roštěná", "unit": "1 kg", "price": "390", "soldOut": false, "isCategoryHeader": true, "tightSpacing": true},
            {"name": "Svíčková biftek", "unit": "1 kg", "price": "800", "soldOut": false, "tightSpacing": true},
            {"name": "Flank steak", "unit": "1 kg", "price": "280", "soldOut": true, "hasBottomBorder": true, "tightSpacing": true},
            {"name": "Silný vývar", "unit": "720 ml", "price": "150", "soldOut": false, "hasBottomBorder": true}
          ],
          "contact": {
            "email": "petr@stateksyrovatkovi.cz", "phone": "+420 123 456 789", "addressLine1": "Farmářská 13", "addressLine2": "Hostivice u Prahy", "legalName": "Statek Syrovátkovi", "ic": "12345678"
          }
        };

        // Hlavní funkce pro načtení obsahu
        async function loadContent() {
            let data;
            try {
                // Pokus o stažení reálného JSONu
                const response = await fetch('./data/content.json');
                if (!response.ok) throw new Error('File not found');
                data = await response.json();
            } catch (err) {
                // Pokud selže (lokální test nebo chybějící soubor), použijeme mockData
                data = mockData;
            }
            render(data);
        }

        // Vykreslení dat do HTML prvků
        function render(data) {
            // Sekce O nás
            document.getElementById('about-text-left').innerHTML = data.about.textLeft.map(p => `<p class="mb-4">${p}</p>`).join('');
            document.getElementById('about-text-right').innerHTML = data.about.textRight.map(p => `<p class="mb-4">${p}</p>`).join('');
            
            // Carousel fotky a tečky
            const carouselContainer = document.getElementById('carousel-images');
            const dotsContainer = document.getElementById('carousel-dots');
            carouselContainer.innerHTML = data.about.carouselImages.map((img, i) => `<img src="${img}" class="carousel-slide arch-image absolute inset-0 transition-opacity duration-700 ease-in-out ${i === 0 ? 'opacity-100 z-10' : 'opacity-0 z-0'}">`).join('');
            dotsContainer.innerHTML = data.about.carouselImages.map((_, i) => `<button class="w-3 h-3 rounded-full ${i === 0 ? 'bg-white' : 'bg-white/40'} transition-all duration-300 shadow-sm cursor-pointer"></button>`).join('');
            initCarousel();

            // Produkty (Ceník)
            document.getElementById('product-list').innerHTML = data.products.map(product => {
                const soldOutClass = product.soldOut ? 'sold-out-row' : '';
                const borderClass = product.hasBottomBorder ? 'border-b-2 border-farm-pink pb-4' : '';
                const spacingClass = product.tightSpacing ? 'py-1' : 'py-4';
                const topPadding = product.isCategoryHeader ? 'pt-5' : '';
                return `
                    <div class="flex justify-between items-end ${borderClass} ${spacingClass} ${topPadding} ${soldOutClass} gap-4 relative">
                        <div class="flex-grow">
                            <span>${product.name}</span>
                            ${product.note ? `<span class="font-normal text-sm opacity-80">(${product.note})</span>` : ''}
                        </div>
                        <div class="w-20 text-right">${product.unit}</div>
                        <div class="w-24 text-right">${product.price} Kč</div>
                    </div>
                `;
            }).join('');

            // Objednávkové tlačítko a kontaktní patička
            document.getElementById('order-button').href = `mailto:${data.contact.email}?subject=Objednávka%20masa`;
            document.getElementById('footer-info').innerHTML = `
                <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-10 text-center text-[13px] md:text-[14px] font-bold uppercase tracking-widest">
                    <div class="flex flex-col"><span>${data.contact.addressLine1}</span><span>${data.contact.addressLine2}</span></div>
                    <div class="flex flex-col"><a href="mailto:${data.contact.email}" class="hover:underline">${data.contact.email}</a><a href="tel:${data.contact.phone.replace(/\s/g, '')}" class="hover:underline">${data.contact.phone}</a></div>
                    <div class="flex flex-col"><span>${data.contact.legalName}</span><span>IČ: ${data.contact.ic}</span></div>
                </div>
            `;
        }

        // Jednoduchá logika pro automatické přepínání fotek
        function initCarousel() {
            const slides = document.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('#carousel-dots button');
            if (slides.length === 0) return;
            
            let currentSlide = 0;
            let slideInterval;

            function goToSlide(index) {
                slides.forEach((slide, i) => {
                    slide.classList.remove('opacity-100', 'z-10'); slide.classList.add('opacity-0', 'z-0');
                    dots[i].classList.remove('bg-white'); dots[i].classList.add('bg-white/40');
                });
                slides[index].classList.remove('opacity-0', 'z-0'); slides[index].classList.add('opacity-100', 'z-10');
                dots[index].classList.remove('bg-white/40'); dots[index].classList.add('bg-white');
                currentSlide = index;
            }

            dots.forEach((dot, index) => dot.addEventListener('click', () => { 
                goToSlide(index); 
                clearInterval(slideInterval); 
                slideInterval = setInterval(() => goToSlide((currentSlide + 1) % slides.length), 3000); 
            }));
            
            slideInterval = setInterval(() => goToSlide((currentSlide + 1) % slides.length), 3000);
        }

        // Spuštění po načtení stránky
        document.addEventListener('DOMContentLoaded', loadContent);

        // Netlify Identity login redirect
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
