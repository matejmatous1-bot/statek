<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administrace | Syrovátkovi Statek</title>
  <!-- Netlify Identity Widget pro správu uživatelů -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    // Zapnutí ruční inicializace (konfigurace je definována níže v JS, ne v YAML souboru)
    window.CMS_MANUAL_INIT = true;
  </script>
  <!-- Načtení Decap CMS z CDN -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    const config = {
      backend: {
        name: "git-gateway",
        branch: "main", // Ujisti se, že tvoje hlavní větev na GitHubu se jmenuje 'main'
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "content",
          label: "Obsah webu",
          delete: false,
          editor: {
            preview: false // Náhled v editoru vypnut pro čistší rozhraní
          },
          files: [
            {
              label: "Hlavní obsah a Produkty",
              name: "data",
              file: "data/content.json",
              fields: [
                {
                  label: "Sekce O nás",
                  name: "about",
                  widget: "object",
                  fields: [
                    { 
                      label: "Levý sloupec (odstavce)", 
                      name: "textLeft", 
                      widget: "list", 
                      field: { label: "Text odstavce", name: "p", widget: "string" } 
                    },
                    { 
                      label: "Pravý sloupec (odstavce)", 
                      name: "textRight", 
                      widget: "list", 
                      field: { label: "Text odstavce", name: "p", widget: "string" } 
                    },
                    { 
                      label: "Fotky v carouselu", 
                      name: "carouselImages", 
                      widget: "list", 
                      min: 4, 
                      max: 4, 
                      field: { label: "Obrázek", name: "img", widget: "image" } 
                    }
                  ]
                },
                {
                  label: "Nabídka masa (Produkty)",
                  name: "products",
                  widget: "list",
                  summary: "{{name}} - {{#if soldOut}}❌ VYPRODÁNO{{else}}✅ SKLADEM{{/if}}",
                  fields: [
                    { label: "Název produktu", name: "name", widget: "string" },
                    { label: "Poznámka (např. části masa)", name: "note", widget: "string", required: false },
                    { label: "Jednotka (např. 1 kg)", name: "unit", widget: "string" },
                    { label: "Cena (číslo)", name: "price", widget: "string" },
                    { label: "VYPRODÁNO (přeškrtne řádek na webu)", name: "soldOut", widget: "boolean", default: false },
                    { label: "Spodní dělící linka (růžová)", name: "hasBottomBorder", widget: "boolean", default: false },
                    { label: "Těsné řádkování (kategorie)", name: "tightSpacing", widget: "boolean", default: false },
                    { label: "Mezera nad řádkem (začátek sekce)", name: "isCategoryHeader", widget: "boolean", default: false }
                  ]
                },
                {
                  label: "Kontaktní údaje",
                  name: "contact",
                  widget: "object",
                  fields: [
                    { label: "Email", name: "email", widget: "string" },
                    { label: "Telefon", name: "phone", widget: "string" },
                    { label: "Adresa řádek 1", name: "addressLine1", widget: "string" },
                    { label: "Adresa řádek 2", name: "addressLine2", widget: "string" },
                    { label: "Název subjektu", name: "legalName", widget: "string" },
                    { label: "IČ", name: "ic", widget: "string" }
                  ]
                }
              ]
            }
          ]
        }
      ]
    };

    // Inicializace CMS s touto konfigurací
    CMS.init({ config });
  </script>
</body>
</html>
